<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" role="img" aria-labelledby="logo-title">
  <title id="logo-title">Digital Confidence Initiative Logo</title>
  
  <!-- LOGO ICON MARK -->
  <g transform="translate(10, 0)">
    <!-- White background shield/circle -->
    <circle cx="75" cy="75" r="60" fill="#FFFFFF" />
    
    <!-- Outer Shield/Ring Outline (styled like the screenshot: a blue/teal ring with bottom path) -->
    <path d="M 75 135 C 108 135, 135 108, 135 75 C 135 42, 108 15, 75 15 C 42 15, 15 42, 15 75" fill="none" stroke="#1A2B4C" stroke-width="6" stroke-linecap="round" />
    
    <!-- Green road path at the bottom curving in -->
    <path d="M 15 75 C 15 108, 42 135, 75 135 C 90 135, 102 120, 110 100 C 115 90, 118 75, 118 75" fill="none" stroke="#2D8B84" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Stylized Figures (Three People: Green, Orange, Teal/Blue) -->
    <!-- Left person (Green) -->
    <circle cx="50" cy="80" r="10" fill="#84CC16" />
    <path d="M 50 90 C 38 90, 38 115, 50 115 C 56 115, 62 108, 62 98 Z" fill="#84CC16" />
    
    <!-- Right person (Teal/Blue) -->
    <circle cx="100" cy="80" r="10" fill="#06B6D4" />
    <path d="M 100 90 C 112 90, 112 115, 100 115 C 94 115, 88 108, 88 98 Z" fill="#06B6D4" />
    
    <!-- Center/Top person (Orange/Yellow - taller/foreground) -->
    <circle cx="75" cy="60" r="12" fill="#F59E0B" />
    <path d="M 75 72 C 60 72, 60 110, 75 110 C 90 110, 90 72, 75 72 Z" fill="#F59E0B" />
    
  </g>

  <!-- TYPOGRAPHY TEXT -->
  <g transform="translate(170, 0)">
    <text x="0" y="42" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="900" fill="#1A2B4C" letter-spacing="1.5">DIGITAL</text>
    <text x="0" y="78" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="900" fill="#1A2B4C" letter-spacing="1.5">CONFIDENCE</text>
    <text x="0" y="114" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="900" fill="#2D8B84" letter-spacing="1.5">INITIATIVE</text>
    <text x="0" y="132" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#475569" letter-spacing="0.5">From access to confidence, together.</text>
  </g>
</svg>
